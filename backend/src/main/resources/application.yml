server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: agri-drone-training
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agri_drone_training?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.drone.training.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# 自定义配置
drone:
  jwt:
    # JWT 密钥(生产环境请使用更复杂的密钥并放入环境变量)
    secret: agri-drone-training-luojian-202308852-secret-key-please-change-in-prod
    # token 有效期(毫秒) 默认7天
    expiration: 604800000
    header: Authorization
    token-prefix: "Bearer "
  upload:
    # 本地文件上传目录(FastDFS 可替换)
    path: ./uploads/
    # 访问前缀
    url-prefix: /api/files/
  license:
    # 执照临期预警天数阈值
    expiring-days: 60
  ai:
    # 智慧农情 AI 助手 (VisualGLM / 第三方大模型 API)
    # 配置真实地址与密钥后即可对接; 未配置时使用内置模拟应答
    enabled: false
    api-url: https://your-visualglm-endpoint/api/diagnose
    api-key: your-api-key

logging:
  level:
    com.drone.training: debug
